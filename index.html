<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Home Run!</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{height:100%;height:-webkit-fill-available;background:#030814;font-family:Arial,sans-serif;overflow:hidden;position:fixed;width:100%;}
#app{display:flex;flex-direction:column;width:100%;height:100%;height:-webkit-fill-available;background:#030814;}
#hud{display:flex;gap:4px;padding:8px;flex-shrink:0;background:rgba(0,0,0,0.4);}
#unlockstrip{display:flex;gap:8px;padding:8px 12px 6px;flex-shrink:0;background:rgba(0,0,0,0.55);border-bottom:1px solid rgba(100,200,255,0.1);}
.ustrip-item{flex:1;display:flex;flex-direction:column;gap:3px;}
.ustrip-top{display:flex;justify-content:space-between;align-items:center;}
.ustrip-name{font-size:10.5px;font-weight:700;letter-spacing:0.5px;}
.ustrip-left{font-size:10.5px;font-weight:700;opacity:0.85;}
.ustrip-track{height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;}
.ustrip-fill{height:100%;border-radius:4px;transition:width 0.5s;}
.ustrip-done{font-size:10.5px;font-weight:700;color:#4ade80;text-align:center;}
.stat{flex:1;background:rgba(10,20,50,0.95);border-radius:10px;padding:4px 6px;text-align:center;border:1.5px solid rgba(100,200,255,0.35);}
.slabel{display:block;font-size:8px;color:#60a5fa;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.sval{display:block;font-size:15px;font-weight:700;color:#fff;}
#lbbtn{background:rgba(10,20,50,0.95);border:1.5px solid rgba(251,191,36,0.5);border-radius:10px;padding:4px 10px;color:#fbbf24;font-size:14px;font-weight:700;flex-shrink:0;-webkit-appearance:none;}
#gamearea{flex:1;position:relative;min-height:0;}
#gc{position:absolute;top:0;left:0;width:100%!important;height:100%!important;display:block;touch-action:none;}
#btm{display:flex;align-items:center;gap:10px;padding:8px 12px;flex-shrink:0;background:#030814;}
#msg{flex:1;font-size:12px;font-weight:700;color:#e2e8f0;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,0.8);}
#pbtn{width:76px;height:76px;border-radius:16px;border:2px solid rgba(255,255,255,0.3);background:linear-gradient(145deg,#e2e8f0,#94a3b8);color:#1a1a2e;font-size:14px;font-weight:900;flex-shrink:0;-webkit-appearance:none;line-height:1.3;}
#pbtn.off{background:#2a3040;color:#555;border-color:#3a4050;}
#pbtn.bonus{background:linear-gradient(145deg,#fbbf24,#f59e0b);color:#1a0a00;font-size:15px;}
#plbl{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;color:#fff;background:rgba(0,0,0,0.78);padding:3px 14px;border-radius:18px;pointer-events:none;opacity:0;transition:opacity 0.3s;white-space:nowrap;z-index:5;}
#pwrbar{position:absolute;bottom:10px;left:10px;width:70px;height:7px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
#pwrfill{height:100%;width:0%;border-radius:3px;background:#4ade80;}
#dfly{position:absolute;top:36px;left:0;right:0;text-align:center;font-size:28px;font-weight:900;color:#fbbf24;pointer-events:none;text-shadow:0 2px 16px rgba(0,0,0,0.95);z-index:5;}
#badge{position:absolute;top:10px;right:10px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;pointer-events:none;white-space:nowrap;z-index:5;display:none;}
#hint{position:absolute;top:68px;left:50%;transform:translateX(-50%);white-space:nowrap;text-align:center;font-size:11px;font-weight:700;color:#38bdf8;background:rgba(3,8,20,0.75);padding:3px 12px;border-radius:12px;pointer-events:none;opacity:0;transition:opacity 0.4s;z-index:8;}
#ranktoast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:auto;z-index:10;opacity:0;transition:opacity 0.3s;cursor:pointer;}
#ranktoast-inner{background:rgba(5,10,30,0.96);border:2px solid #7c3aed;border-radius:18px;padding:10px 20px;}
#ranktoast-title{font-size:22px;font-weight:900;color:#fbbf24;}
#ranktoast-sub{font-size:11px;color:#c084fc;margin-top:2px;letter-spacing:1px;}
#milestone{position:absolute;bottom:28px;left:10px;font-size:16px;font-weight:900;text-align:left;pointer-events:none;z-index:7;opacity:0;transition:opacity 0.15s;white-space:nowrap;}
#zone{position:absolute;bottom:14px;left:10px;font-size:9px;font-weight:700;pointer-events:none;z-index:5;opacity:0;transition:opacity 0.5s;letter-spacing:2px;text-transform:uppercase;}
#bonusfl{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:6;opacity:0;transition:opacity 0.3s;}
#bonustxt{font-size:44px;font-weight:900;color:#fbbf24;text-align:center;}
#aban{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(8,15,40,0.97);border:2px solid #fbbf24;border-radius:20px;padding:20px 26px;text-align:center;z-index:25;display:none;min-width:230px;}
#modalbg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(3,6,18,0.98);display:none;flex-direction:column;padding:12px;z-index:30;overflow:hidden;}
#modalbg.open{display:flex;}
#modalbg h2{color:#fbbf24;font-size:14px;font-weight:700;margin-bottom:8px;text-align:center;}
.tabs{display:flex;gap:5px;margin-bottom:7px;}
.tab{flex:1;padding:5px;border-radius:8px;border:1px solid #7c3aed;background:transparent;color:#c084fc;font-size:10px;text-align:center;font-weight:700;}
.tab.active{background:#7c3aed;color:#fff;}
#nrow{display:flex;gap:5px;margin-bottom:7px;}
#nrow input{flex:1;padding:5px 7px;border-radius:8px;border:1px solid #7c3aed;background:#0a1020;color:#fff;font-size:11px;-webkit-appearance:none;}
#nrow select{padding:4px;border-radius:8px;border:1px solid #7c3aed;background:#0a1020;color:#fff;font-size:10px;}
#savebtn{padding:5px 10px;border-radius:8px;background:#7c3aed;border:none;color:#fff;font-size:11px;font-weight:700;}
#lbscroll{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;margin-bottom:5px;}
.lbrow{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:7px;margin-bottom:2px;background:rgba(255,255,255,0.04);}
.lbrank{font-size:11px;font-weight:700;min-width:24px;text-align:center;color:#fbbf24;}
.lbname{flex:1;font-size:10px;color:#e2e8f0;font-weight:700;}
.lbdist{font-size:11px;font-weight:700;color:#4ade80;}
.lbyou{background:rgba(124,58,237,0.2);border:1px solid #7c3aed;}
#backbtn{width:100%;padding:10px;border-radius:10px;background:#16a34a;border:none;color:#fff;font-size:13px;font-weight:700;}
.urow{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.uprog-wrap{margin-bottom:8px;}
.uprog-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.uprog-label{font-size:9px;font-weight:700;width:52px;flex-shrink:0;text-align:right;}
.uprog-track{flex:1;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;position:relative;}
.uprog-fill{height:100%;border-radius:4px;transition:width 0.4s;}
.uprog-pct{font-size:8px;width:30px;flex-shrink:0;text-align:left;opacity:0.7;}
.uprog-done{font-size:10px;width:30px;flex-shrink:0;text-align:center;}
.uchip{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;}
.ul{background:rgba(255,255,255,0.05);color:#475569;border:1px solid #334155;}
.uu{background:rgba(251,191,36,0.18);color:#fbbf24;border:1px solid #fbbf24;}
</style>
</head>
<body>
<div id="app">
  <div id="unlockstrip">
    <div class="ustrip-item" id="ustrip-silver">
      <div class="ustrip-top">
        <span class="ustrip-name" style="color:#94a3b8;">SILVER</span>
        <span class="ustrip-left" id="usleft-silver" style="color:#94a3b8;"></span>
      </div>
      <div class="ustrip-track"><div class="ustrip-fill" id="usfill-silver" style="background:linear-gradient(90deg,#475569,#e2e8f0);width:0%"></div></div>
    </div>
    <div class="ustrip-item" id="ustrip-gold">
      <div class="ustrip-top">
        <span class="ustrip-name" style="color:#fbbf24;">GOLD</span>
        <span class="ustrip-left" id="usleft-gold" style="color:#fbbf24;"></span>
      </div>
      <div class="ustrip-track"><div class="ustrip-fill" id="usfill-gold" style="background:linear-gradient(90deg,#92400e,#fde68a);width:0%"></div></div>
    </div>
    <div class="ustrip-item" id="ustrip-diamond">
      <div class="ustrip-top">
        <span class="ustrip-name" style="color:#7dd3fc;">DIAMOND</span>
        <span class="ustrip-left" id="usleft-diamond" style="color:#7dd3fc;"></span>
      </div>
      <div class="ustrip-track"><div class="ustrip-fill" id="usfill-diamond" style="background:linear-gradient(90deg,#0369a1,#bae6fd);width:0%"></div></div>
    </div>
  </div>
<div id="stagebar" style="background:rgba(0,0,0,0.7);padding:4px 10px;text-align:center;border-bottom:1px solid rgba(100,200,255,0.2);flex-shrink:0;">
  <span id="stagelbl" style="font-size:11px;font-weight:700;color:#60a5fa;letter-spacing:1px;">STAGE 1</span>
  <span style="color:#475569;margin:0 6px;">|</span>
  <span id="stagegoal" style="font-size:11px;color:#e2e8f0;">Hit 100m</span>
  <span style="color:#475569;margin:0 6px;">|</span>
  <span id="stageprog" style="font-size:11px;color:#fbbf24;">0/1</span>
</div>
<div id="hud">
    <div class="stat"><span class="slabel">LAST</span><span class="sval" id="sdist">0 m</span></div>
    <div class="stat"><span class="slabel">BEST</span><span class="sval" id="sbest">0 m</span></div>
    <div class="stat"><span class="slabel">TOTAL</span><span class="sval" id="stotal">0 m</span></div>
    <div class="stat"><span class="slabel">HITS</span><span class="sval" id="shits">0</span></div>
    <div class="stat"><span class="slabel">SCORE</span><span class="sval" id="sscore">0</span></div>
    <button id="lbbtn" onclick="openLB()">&#127942;</button>
  </div>
  <div id="gamearea">
    <canvas id="gc"></canvas>
    <div id="plbl"></div>
    <div id="swipehint" style="position:absolute;bottom:28%;left:50%;transform:translateX(-50%);pointer-events:none;z-index:6;opacity:0;transition:opacity 0.5s;text-align:center;">
      <canvas id="swingCanvas" width="180" height="150" style="display:block;margin:0 auto;"></canvas>
    </div>
    <div id="pwrbar"><div id="pwrfill"></div></div>
    <div id="dfly"></div>
    <div id="badge"></div>
    <div id="hint"></div>
    <div id="milestone"></div>
    <div id="zone"></div>
    <div id="ranktoast" onclick="openLB()"><div id="ranktoast-inner"><div id="ranktoast-title"></div><div id="ranktoast-sub">TAP TO SEE LEADERBOARD</div></div></div>
    <div id="bonusfl"><div id="bonustxt">BONUS!</div></div>
    <div id="aban">
      <div id="abicon" style="font-size:38px;margin-bottom:6px"></div>
      <div id="abtitle" style="font-size:15px;font-weight:700;color:#fbbf24;margin-bottom:4px"></div>
      <div id="abdesc" style="font-size:11px;color:#cbd5e1;margin-bottom:10px"></div>
      <button onclick="closeAban()" style="padding:6px 20px;border-radius:12px;background:#7c3aed;border:none;color:#fff;font-size:12px;font-weight:700;">Awesome!</button>
    </div>
    <div id="windtutorial" style="position:absolute;bottom:18px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:9;opacity:0;transition:opacity 0.5s;white-space:nowrap;">
      <div style="background:rgba(3,8,20,0.82);border:1.5px solid #38bdf8;border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;color:#38bdf8;">
        Swipe right while ball flies for boost!
      </div>
    </div>
    <div id="modalbg">
      <h2>Hall of Fame</h2>
      <div id="nrow"><input id="pname" placeholder="Your name" maxlength="16"/><button id="savebtn" onclick="saveScore()">Save</button></div>
      <div style="margin-bottom:6px"><div style="color:#c084fc;font-weight:700;font-size:9px;margin-bottom:2px;">BALLS UNLOCKED</div><div class="urow" id="uchips"></div></div>
      <div class="uprog-wrap" id="upgwrap">
        <div style="color:#c084fc;font-weight:700;font-size:9px;margin-bottom:5px;">UNLOCK PROGRESS</div>
        <div class="uprog-row" id="uprow-silver">
          <span class="uprog-label" style="color:#94a3b8;">SILVER</span>
          <div class="uprog-track"><div class="uprog-fill" id="upfill-silver" style="background:linear-gradient(90deg,#64748b,#e2e8f0);"></div></div>
          <span class="uprog-pct" id="uppct-silver" style="color:#94a3b8;"></span>
          <span class="uprog-done" id="updone-silver"></span>
        </div>
        <div class="uprog-row" id="uprow-gold">
          <span class="uprog-label" style="color:#fbbf24;">GOLD</span>
          <div class="uprog-track"><div class="uprog-fill" id="upfill-gold" style="background:linear-gradient(90deg,#92400e,#fde68a);"></div></div>
          <span class="uprog-pct" id="uppct-gold" style="color:#fbbf24;"></span>
          <span class="uprog-done" id="updone-gold"></span>
        </div>
        <div class="uprog-row" id="uprow-diamond">
          <span class="uprog-label" style="color:#7dd3fc;">DIAMOND</span>
          <div class="uprog-track"><div class="uprog-fill" id="upfill-diamond" style="background:linear-gradient(90deg,#0369a1,#e0f2fe);"></div></div>
          <span class="uprog-pct" id="uppct-diamond" style="color:#7dd3fc;"></span>
          <span class="uprog-done" id="updone-diamond"></span>
        </div>
      </div>
      <div class="tabs"><div class="tab active" onclick="swTab('best')">Best Hit</div><div class="tab" onclick="swTab('total')">Total</div><div class="tab" onclick="swTab('hits')">Most Hits</div></div>
      <div id="lbscroll"><div id="lblist"></div></div>
      <button id="backbtn" onclick="closeLB()">Back to Game</button>
    </div>
  </div>
  <div id="btm">
    <div id="msg">Tap PITCH BALL to start!</div>
    <button id="pbtn" onclick="doPitch()">PITCH<br>BALL</button>
  </div>
</div>
<script>
var db = null;
try {
  firebase.initializeApp({
    apiKey: "AIzaSyBibMaIWSlSrWo9eyKxrSZs6bCgub8SvVY",
    authDomain: "free-ball-homerun.firebaseapp.com",
    projectId: "free-ball-homerun",
    storageBucket: "free-ball-homerun.firebasestorage.app",
    messagingSenderId: "51965941873",
    appId: "1:51965941873:web:4b39a073e9b1c9b90d63d0"
  });
  db = firebase.firestore();
} catch(e) { console.log('Firebase init failed:', e); }
var gc = document.getElementById('gc');
var ctx = gc.getContext('2d');
var gamearea = document.getElementById('gamearea');

function sizeCanvas() {
  var w = gamearea.clientWidth;
  var h = gamearea.clientHeight;
  if (h < 10) {
    var hh = document.getElementById('hud').clientHeight || 52;
    var bh = document.getElementById('btm').clientHeight || 86;
    h = window.innerHeight - hh - bh;
  }
  if (w < 10) w = window.innerWidth;
  gc.width = w;
  gc.height = h;
}
sizeCanvas();
window.addEventListener('resize', sizeCanvas);
function W() { return gc.width > 0 ? gc.width : 375; }
function H() { return gc.height > 0 ? gc.height : 600; }
function GR() { return H() * 0.83; }

// -- LEADERBOARD --
var best=0, totalRange=0, hits=0, myName='';
var scores = [], curTab = 'best', pendingScore = null;
var myDocId = null;

// Load scores from Firestore
function loadScores() {
  if (!db) return;
  db.collection('scores').orderBy('dist','desc').limit(100).get().then(function(snap) {
    scores = [];
    snap.forEach(function(doc) {
      var d = doc.data();
      d.id = doc.id;
      scores.push(d);
    });
    renderLB();
  }).catch(function(e){ console.log('loadScores err',e); });
}

var unlocked = {regular:1,fire:1,ice:1,zigzag:1,ghost:1,multi:1};
var nextSilverAt=5000, nextGoldAt=50000, nextDiamondAt=100000;
var silverReady=0, goldReady=0, diamondReady=0;
var achievements = [], bonusActive=false, bonusTotal=0, bonusNextAt=5000;

var ADEFS = [
  {id:'first',name:'First Hit!',desc:'Hit your first ball',emoji:'*',check:function(){return hits>=1;}}
];
function checkAch() {
  for (var i = 0; i < ADEFS.length; i++) {
    var a = ADEFS[i];
    if (achievements.indexOf(a.id) >= 0) continue;
    if (a.check()) {
      achievements.push(a.id);
      if (a.unlock) unlocked[a.unlock] = 1;
      showAban(a);
      updateChips();
    }
  }
}
function showAban(a) {
  document.getElementById('abicon').textContent = a.emoji;
  document.getElementById('abtitle').textContent = a.name;
  document.getElementById('abdesc').textContent = a.desc;
  document.getElementById('aban').style.display = 'block';
}
function closeAban() { document.getElementById('aban').style.display = 'none'; }
function updateChips() {
  var BN = {regular:'Regular',fire:'Fire',ice:'Ice',zigzag:'Zigzag',ghost:'Ghost',
            multi:'Multi',silver:'Silver',gold:'Gold',diamond:'Diamond'};
  var h = '';
  var keys = Object.keys(BN);
  for (var i = 0; i < keys.length; i++) {
    var id = keys[i];
    h += '<span class="uchip ' + (unlocked[id] ? 'uu' : 'ul') + '">' + BN[id] + '</span>';
  }
  document.getElementById('uchips').innerHTML = h;
  updateUnlockBars();
}
function updateUnlockBars() {
  var tiers = [
    {id:'silver', ready:silverReady, at:nextSilverAt},
    {id:'gold',   ready:goldReady,   at:nextGoldAt},
    {id:'diamond',ready:diamondReady,at:nextDiamondAt}
  ];
  for (var i = 0; i < tiers.length; i++) {
    var t = tiers[i];
    var fill = document.getElementById('upfill-'+t.id);
    var pct  = document.getElementById('uppct-'+t.id);
    var done = document.getElementById('updone-'+t.id);
    if (!fill) continue;
    if (t.ready) {
      fill.style.width = '100%';
      pct.textContent = '';
      done.textContent = 'DONE';
      done.style.color = '#4ade80';
      done.style.fontWeight = '700';
      done.style.fontSize = '9px';
    } else {
      var progress = Math.min(totalRange / t.at, 1);
      var pctNum = Math.floor(progress * 100);
      fill.style.width = pctNum + '%';
      var left = t.at - totalRange;
      if (left >= 1000) {
        pct.textContent = Math.round(left/1000) + 'km';
      } else {
        pct.textContent = left + 'm';
      }
      done.textContent = '';
    }
  }
}
function openLB() { document.getElementById('modalbg').classList.add('open'); document.getElementById('pbtn').style.visibility='hidden'; loadScores(); updateChips(); }
function closeLB() { document.getElementById('modalbg').classList.remove('open'); document.getElementById('pbtn').style.visibility='visible'; }
function closeLBAndPitch() { closeLB(); if(typeof doPitch==='function') doPitch(); }
function swTab(t) {
  curTab = t;
  var tabs = document.querySelectorAll('.tab');
  tabs[0].classList.toggle('active', t==='best');
  tabs[1].classList.toggle('active', t==='total');
  tabs[2].classList.toggle('active', t==='hits');
  renderLB();
}
function autoUpdateScore() {
  if (!db || !myDocId || !myName) return;
  db.collection('scores').doc(myDocId).get().then(function(doc) {
    var prev = doc.exists ? doc.data() : {};
    return db.collection('scores').doc(myDocId).set({
      name: myName,
      dist: Math.max(best, prev.dist||0),
      total: Math.max(totalRange, prev.total||0),
      hits: Math.max(hits, prev.hits||0),
      ts: Date.now()
    });
  }).then(function() {
    loadScores();
  }).catch(function(e){ console.log('autoUpdate err',e); });
}
function saveScore() {
  var n = document.getElementById('pname').value.trim();
  if (!n || !pendingScore) return;
  myName = n;
  var btn = document.getElementById('savebtn');
  if (!db) { btn.textContent = 'Offline'; return; }
  btn.textContent = 'Saving...';
  btn.disabled = true;
  var data = {name:n, dist:pendingScore, total:totalRange, hits:hits, ts:Date.now()};
  if (myDocId) {
    // Update existing entry — only improve stats
    db.collection('scores').doc(myDocId).get().then(function(doc) {
      var prev = doc.exists ? doc.data() : {};
      return db.collection('scores').doc(myDocId).set({
        name: n,
        dist: Math.max(pendingScore, prev.dist||0),
        total: Math.max(totalRange, prev.total||0),
        hits: Math.max(hits, prev.hits||0),
        ts: Date.now()
      });
    }).then(function() {
      btn.textContent = 'Saved!';
      loadScores();
    }).catch(function(e){ btn.textContent = 'Save'; btn.disabled=false; });
  } else {
    db.collection('scores').add(data).then(function(ref) {
      myDocId = ref.id;
      btn.textContent = 'Saved!';
      loadScores();
    }).catch(function(e){ btn.textContent = 'Save'; btn.disabled=false; });
  }
  checkAch();
}
function getMyRank(tab) {
  if (!myName) return 0;
  var data = scores.slice().sort(function(a,b) {
    if (tab==='total') return b.total - a.total;

function getZone(m) {

function lerp(a, b, t) { return a + (b - a) * t; }
function lerpJ(key, target, spd) {

function updateJourney(balls) {
  var anyF = null;
  for (var i = 0; i < balls.length; i++) {
    if (balls[i].flying) { anyF = balls[i]; break; }
  }
  var s = 0.04;

    var keys = ['dusk','strato','moon','sun','earth','mars','outer','kuiper','interstellar','milky','andromeda','deep'];
    for (var i = 0; i < keys.length; i++) {
      lerpJ(keys[i], 0, 0.006);
    }
    return;
  }
  var m = Math.max(0, (anyF.wx - HOME_X) / PPM);
  J.meters = m;
  function t(min, max) { return Math.min(1, Math.max(0, (m - min) / (max - min))); }
  lerpJ('dusk',         t(30,  90),  s);
  lerpJ('strato',       t(80,  160), s);
  lerpJ('moon',         t(150, 220), s);
  lerpJ('sun',          t(200, 270), s);
  lerpJ('earth',        t(260, 310), s);
  lerpJ('mars',         t(300, 340), s);
  lerpJ('outer',        t(330, 370), s);
  lerpJ('kuiper',       t(364, 396), s);
  lerpJ('interstellar', t(390, 420), s);
  lerpJ('milky',        t(410, 430), s);
  lerpJ('andromeda',    t(424, 436), s);
  lerpJ('deep',         t(432, 440), s);

  // Milestones every 50m
  var mf = Math.floor(m / 50) * 50;
  if (mf > 0 && mf > lastMilestone && mf >= 50) {
    lastMilestone = mf;
    var labels = {
      40:'40m - Deep outfield!',

  }
  // Zone name
  var z = getZone(m);

// -- DRAW SKY BACKGROUND (screen space) --

function drawSkyScreen() {
  var sw = W(), sh = H(), skyH = sh + 10; // fill entire canvas
  var j = J;

  // 1. Sky gradient
  var r0 = Math.round(2 + j.dusk*28 + j.andromeda*10 + j.deep*15);
  var g0 = Math.round(9 + j.dusk*8);
  var b0 = Math.round(20 + j.strato*20);
  var r1 = Math.round(6 + j.dusk*40);
  var g1 = Math.round(18 + j.dusk*18);
  var b1 = Math.round(34 + j.strato*20);
  var r2 = Math.round(11 + j.dusk*55);
  var g2 = Math.round(31 + j.dusk*28);
  var b2 = Math.round(58 + j.strato*10);
  var sg = ctx.createLinearGradient(0, 0, 0, skyH);
  sg.addColorStop(0, 'rgb('+r0+','+g0+','+b0+')');
  sg.addColorStop(0.5, 'rgb('+r1+','+g1+','+b1+')');
  sg.addColorStop(1, 'rgb('+r2+','+g2+','+b2+')');
  ctx.fillStyle = sg;
  ctx.fillRect(0, 0, sw, skyH);

  // 2. Dusk horizon glow
  if (j.dusk > 0.05 && j.strato < 0.9) {
    var da = j.dusk * (1 - j.strato) * 0.55;
    var dg = ctx.createRadialGradient(sw*0.5, skyH, 0, sw*0.5, skyH, sw*1.5);
    dg.addColorStop(0, 'rgba(255,90,20,'+da+')');
    dg.addColorStop(0.3, 'rgba(200,30,70,'+(da*0.5)+')');
    dg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = dg;
    ctx.fillRect(0, 0, sw, skyH);
  }

  // 3. Stars (fade in with strato)
  var starA = j.strato * 0.5 + (j.moon + j.sun + j.earth + j.mars) * 0.12;
  starA = Math.min(1, starA);
  if (starA > 0.01) {
    for (var i = 0; i < STARS.length; i++) {
      var s = STARS[i];
      var sx = ((s.x % sw) + sw) % sw;
      // Stars spread across FULL canvas height, not just top
      var sy = s.y % sh;
      s.tw += s.ts;
      var twink = 0.7 + 0.3 * Math.sin(s.tw);
      // Stars near ground only visible in deep space
      // Stars in upper half visible sooner, lower half need more progress
      var yFrac = sy / sh; // 0=top, 1=bottom
      // Upper stars appear with strato, lower stars need more distance
      var starThresh = yFrac * 0.7; // top=0 threshold, bottom=0.7 threshold
      var localA = (starA - starThresh) / (1 - starThresh);
      if (localA <= 0) continue;
      localA = Math.min(1, localA);
      var a = s.br * localA * twink;
      if (a < 0.015) continue;
      // Color variety increases with depth
      if (j.milky > 0.3) {
        var hues = [0,210,45,25,280,180,320,160];
        ctx.fillStyle = 'hsl('+hues[i%8]+',65%,88%)';
      } else if (j.interstellar > 0.2) {
        // Slight color tint in interstellar
        ctx.fillStyle = i%7===0?'rgba(180,200,255,1)':i%5===0?'rgba(255,240,200,1)':'rgba(255,255,255,1)';
      } else {
        ctx.fillStyle = 'rgba(255,255,255,1)';
      }
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(sx, sy, s.r, 0, Math.PI*2);
      ctx.fill();
      // Sparkle for bright stars deep in space
      if (s.r > 1.5 && j.interstellar > 0.4) {
        ctx.globalAlpha = a * 0.5;
        ctx.strokeStyle = ctx.fillStyle;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(sx-s.r*4, sy); ctx.lineTo(sx+s.r*4, sy);
        ctx.moveTo(sx, sy-s.r*4); ctx.lineTo(sx, sy+s.r*4);
        ctx.stroke();

  }

  // 4. MOON (appears at 120m)
  if (j.moon > 0.04) {
    var moonX = sw * 0.22;
    var moonY = 38 + j.moon * 50;

    mg.addColorStop(0, 'rgba(200,220,255,0.3)');

    ms.addColorStop(0,'#ffffff'); ms.addColorStop(0.2,'#e8edf5');

  }

  // 5. SUN (appears at 180m)
  if (j.sun > 0.04) {
    var sunX = sw * 0.80;
    var sunY = 48;
    var sunR = 18 + j.sun * 32;
    ctx.save();
    ctx.globalAlpha = Math.min(1, j.sun * 1.4);
    // Corona layers
    for (var ray = 0; ray < 3; ray++) {

    ctx.save();
    ctx.globalAlpha = Math.min(1, j.mars * 1.5);
    var marg = ctx.createRadialGradient(marX-marR*0.3, marY-marR*0.3, 0, marX, marY, marR);
    marg.addColorStop(0,'rgba(255,200,150,0.5)'); marg.addColorStop(0.2,'#c2410c');
    marg.addColorStop(0.65,'#7f1d1d'); marg.addColorStop(1,'rgba(30,5,0,0.95)');
    ctx.fillStyle = marg; ctx.beginPath(); ctx.arc(marX, marY, marR, 0, Math.PI*2); ctx.fill();
    // Polar cap
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath(); ctx.arc(marX, marY-marR*0.72, marR*0.32, 0, Math.PI*2); ctx.fill();
    // Asteroid belt drifting across
    ctx.globalAlpha = j.mars * 0.7;
    for (var a = 0; a < 30; a++) {
      var ax = ((a*631 + waveT*15) % (sw+50));
      var ay = 175 + Math.sin(a*1.1) * 55;
      ctx.fillStyle = 'rgba(160,140,110,0.8)';
      var ar = 1 + (a*113)%3;
      ctx.beginPath(); ctx.arc(ax, ay, ar, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // 8. JUPITER, SATURN, URANUS (350m)
  if (j.outer > 0.04) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, j.outer * 1.4);
    // Jupiter
    var jx = sw*0.38, jy = 130, jr = 22 + j.outer*16;
    var jg = ctx.createRadialGradient(jx-jr*0.3, jy-jr*0.3, 0, jx, jy, jr);
    jg.addColorStop(0,'rgba(255,240,200,0.4)'); jg.addColorStop(0.15,'#d97706');
    jg.addColorStop(0.45,'#b45309'); jg.addColorStop(0.7,'#d97706');
    jg.addColorStop(0.9,'#92400e'); jg.addColorStop(1,'rgba(30,10,0,0.95)');
    ctx.fillStyle = jg; ctx.beginPath(); ctx.arc(jx, jy, jr, 0, Math.PI*2); ctx.fill();
    // Bands
    ctx.save(); ctx.beginPath(); ctx.arc(jx, jy, jr, 0, Math.PI*2); ctx.clip();
    for (var b = 0; b < 5; b++) {
      ctx.fillStyle = b%2===0 ? 'rgba(200,140,60,0.22)' : 'rgba(120,60,10,0.22)';
      ctx.fillRect(jx-jr, jy-jr+(b*jr*0.4), jr*2, jr*0.4+3);
    }
    // Red spot
    ctx.fillStyle = 'rgba(200,50,20,0.5)';
    ctx.beginPath(); ctx.ellipse(jx+jr*0.2, jy+jr*0.1, jr*0.22, jr*0.13, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // Saturn
    var sx2 = sw*0.73, sy2 = 118, sr2 = 16 + j.outer*11;
    var sg2 = ctx.createRadialGradient(sx2-sr2*0.3, sy2-sr2*0.3, 0, sx2, sy2, sr2);
    sg2.addColorStop(0,'rgba(255,250,200,0.4)'); sg2.addColorStop(0.2,'#ca8a04');
    sg2.addColorStop(0.6,'#92400e'); sg2.addColorStop(1,'rgba(40,15,0,0.95)');
    ctx.fillStyle = sg2; ctx.beginPath(); ctx.arc(sx2, sy2, sr2, 0, Math.PI*2); ctx.fill();
    // Saturn rings
    ctx.save();
    ctx.transform(1, 0.15, -0.1, 1, sx2, sy2);
    for (var ri = 0; ri < 4; ri++) {
      var ra = sr2*(1.4+ri*0.35), rb = sr2*0.22;
      ctx.strokeStyle = 'rgba(200,160,60,'+(0.55-ri*0.1)+')';
      ctx.lineWidth = ri===0 ? 4 : ri===1 ? 3 : 2;
      ctx.beginPath(); ctx.ellipse(0, 0, ra, rb, 0, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
    // Uranus
    var ux = sw*0.12, uy = 165, ur2 = 8 + j.outer*7;
    var ug = ctx.createRadialGradient(ux, uy, 0, ux, uy, ur2);
    ug.addColorStop(0,'rgba(150,255,255,0.35)'); ug.addColorStop(0.45,'#06b6d4');
    ug.addColorStop(1,'rgba(0,30,60,0.95)');
    ctx.fillStyle = ug; ctx.beginPath(); ctx.arc(ux, uy, ur2, 0, Math.PI*2); ctx.fill();
    ctx.save();
    ctx.transform(0.3, 1, -0.8, 0.2, ux, uy);
    ctx.strokeStyle = 'rgba(6,182,212,0.45)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(0, 0, ur2*1.8, ur2*0.3, 0, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
    ctx.restore();
  }

  // 9. NEPTUNE + PLUTO + KUIPER (400m)
  if (j.kuiper > 0.04) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, j.kuiper * 1.4);
    // Neptune
    var nx2 = sw*0.82, ny2 = 155, nr2 = 10 + j.kuiper*8;
    var ng = ctx.createRadialGradient(nx2, ny2, 0, nx2, ny2, nr2);
    ng.addColorStop(0,'rgba(100,150,255,0.4)'); ng.addColorStop(0.4,'#1d4ed8');
    ng.addColorStop(1,'rgba(0,0,30,0.95)');
    ctx.fillStyle = ng; ctx.beginPath(); ctx.arc(nx2, ny2, nr2, 0, Math.PI*2); ctx.fill();
    // Pluto
    ctx.fillStyle = 'rgba(150,120,100,0.85)';
    ctx.beginPath(); ctx.arc(nx2+48, ny2+25, 4, 0, Math.PI*2); ctx.fill();
    // Kuiper belt ice
    for (var k = 0; k < 50; k++) {
      var kx = ((k*617 + waveT*6) % (sw+100));
      var ky = 215 + Math.cos(k*1.1) * 65;
      ctx.fillStyle = 'rgba(180,220,255,0.6)';
      ctx.globalAlpha = j.kuiper * 0.6;
      ctx.beginPath(); ctx.arc(kx, ky, 0.8+(k%3)*0.5, 0, Math.PI*2); ctx.fill();
    }
    // Comets
    ctx.globalAlpha = j.kuiper * 0.85;
    for (var cm = 0; cm < 6; cm++) {
      var cmx = ((cm*700 + waveT*40) % (sw+300)) - 100;
      var cmy = 50 + cm*35;
      if (cmx < -200 || cmx > sw+100) continue;
      var ctg = ctx.createLinearGradient(cmx, cmy, cmx-80, cmy-32);
      ctg.addColorStop(0, 'rgba(200,240,255,0.9)');
      ctg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.strokeStyle = ctg; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(cmx, cmy); ctx.lineTo(cmx-80, cmy-32); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.beginPath(); ctx.arc(cmx, cmy, 2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // 10. INTERSTELLAR + Alpha Centauri (450m)
  if (j.interstellar > 0.04) {
    ctx.save();
    // Cosmic dust nebula clouds
    ctx.globalAlpha = j.interstellar * 0.3;
    var dustCols = ['rgba(80,0,120,', 'rgba(0,30,100,', 'rgba(120,40,0,', 'rgba(0,80,120,'];
    for (var d = 0; d < 6; d++) {
      var dx2 = (d * 97 + 50) % sw;
      var dy2 = 60 + (d * 113) % 280;
      var dr = 60 + (d*77)%100;
      var dcol = dustCols[d%4];
      var ddg = ctx.createRadialGradient(dx2, dy2, 0, dx2, dy2, dr);
      ddg.addColorStop(0, dcol+'0.18)');
      ddg.addColorStop(1, dcol+'0)');
      ctx.fillStyle = ddg;
      ctx.beginPath(); ctx.arc(dx2, dy2, dr, 0, Math.PI*2); ctx.fill();
    }
    // Alpha Centauri binary
    if (j.interstellar > 0.4) {
      ctx.globalAlpha = (j.interstellar - 0.4) * 1.5;
      var acx = sw*0.58, acy = 100;
      var acg = ctx.createRadialGradient(acx, acy, 0, acx, acy, 20);
      acg.addColorStop(0,'#ffffff'); acg.addColorStop(0.3,'#fff8dc');
      acg.addColorStop(0.7,'#ffd700'); acg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = acg; ctx.beginPath(); ctx.arc(acx, acy, 20, 0, Math.PI*2); ctx.fill();
      var acbg = ctx.createRadialGradient(acx+42, acy+22, 0, acx+42, acy+22, 13);
      acbg.addColorStop(0,'#ffffff'); acbg.addColorStop(0.4,'#ffd0a0');
      acbg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = acbg; ctx.beginPath(); ctx.arc(acx+42, acy+22, 13, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(220,60,60,0.75)';
      ctx.beginPath(); ctx.arc(acx-55, acy-18, 5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // 11. MILKY WAY CORE (600m)
  if (j.milky > 0.04) {
    ctx.save();
    var gcx = sw*0.5, gcy = sh*0.38;
    // Galactic plane glow
    ctx.globalAlpha = j.milky * 0.45;
    var gpg = ctx.createLinearGradient(0, gcy-90, 0, gcy+90);
    gpg.addColorStop(0,'rgba(255,200,100,0)'); gpg.addColorStop(0.5,'rgba(255,180,80,0.3)');
    gpg.addColorStop(1,'rgba(255,200,100,0)');
    ctx.fillStyle = gpg; ctx.fillRect(0, gcy-90, sw, 180);
    // Core glow
    ctx.globalAlpha = j.milky * 0.55;
    var gcg = ctx.createRadialGradient(gcx, gcy, 0, gcx, gcy, sw*0.55);
    gcg.addColorStop(0,'rgba(255,220,120,0.75)'); gcg.addColorStop(0.18,'rgba(255,160,60,0.28)');
    gcg.addColorStop(0.5,'rgba(180,60,200,0.12)'); gcg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = gcg;
    ctx.beginPath(); ctx.ellipse(gcx, gcy, sw*0.55, 140, 0, 0, Math.PI*2); ctx.fill();
    // Dense star field
    ctx.globalAlpha = j.milky;
    var gCols = ['#fde68a','#fbbf24','#ffffff','#f472b6','#a78bfa','#60a5fa'];
    for (var gs = 0; gs < 400; gs++) {
      var gsx = ((gs*1009+17) % (sw+200)) - 50;
      if (gsx < 0 || gsx > sw) continue;
      var gsy = gcy - 55 + ((gs*743+11) % 110);
      var ga = 0.3 + 0.55*(((gs*317)%100)/100);
      ctx.fillStyle = gCols[gs%6];
      ctx.globalAlpha = j.milky * ga;
      var gsr = gs%15===0 ? 1.8 : gs%5===0 ? 0.9 : 0.4;
      ctx.beginPath(); ctx.arc(gsx, gsy, gsr, 0, Math.PI*2); ctx.fill();
    }
    // Spiral arms
    ctx.globalAlpha = j.milky * 0.12;
    for (var arm = 0; arm < 3; arm++) {
      var ag = ctx.createLinearGradient(0, gcy, sw, gcy);
      ag.addColorStop(0,'rgba(255,200,100,0)'); ag.addColorStop(0.5,'rgba(255,200,100,1)');
      ag.addColorStop(1,'rgba(255,200,100,0)');
      ctx.fillStyle = ag;
      ctx.save();
      ctx.translate(gcx, gcy);
      ctx.rotate(arm * Math.PI*2/3 + waveT*0.04);
      ctx.fillRect(-sw, -7, sw*2, 14);
      ctx.restore();
    }
    ctx.restore();
  }

  // 12. ANDROMEDA GALAXY (700m)
  if (j.andromeda > 0.04) {
    ctx.save();
    var agx = sw*0.6, agy = sh*0.3;
    ctx.globalAlpha = j.andromeda * 0.65;
    var ahalo = ctx.createRadialGradient(agx, agy, 0, agx, agy, 280);
    ahalo.addColorStop(0,'rgba(160,140,220,0.85)'); ahalo.addColorStop(0.3,'rgba(100,80,180,0.28)');
    ahalo.addColorStop(0.7,'rgba(60,40,120,0.1)'); ahalo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = ahalo;
    ctx.save();ctx.translate(agx,agy);ctx.rotate(0.3);ctx.beginPath();ctx.ellipse(0,0,280,110,0,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.globalAlpha = j.andromeda;
    var anuc = ctx.createRadialGradient(agx, agy, 0, agx, agy, 45);
    anuc.addColorStop(0,'rgba(255,255,255,0.95)'); anuc.addColorStop(0.2,'rgba(220,200,255,0.6)');
    anuc.addColorStop(0.6,'rgba(140,100,220,0.3)'); anuc.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = anuc;
    ctx.beginPath(); ctx.arc(agx, agy, 45, 0, Math.PI*2); ctx.fill();
    // Stars
    for (var ai = 0; ai < 150; ai++) {
      var asx = agx - 110 + ((ai*317)%220);
      var asy = agy - 44 + ((ai*211)%88);
      ctx.fillStyle = 'rgba(200,190,255,0.8)';
      ctx.globalAlpha = j.andromeda * (0.25 + 0.4*((ai%5)/5));
      ctx.beginPath();
      ctx.arc(asx, asy, ai%12===0 ? 1.4 : 0.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  // 13. DEEP UNIVERSE - other galaxies + web (800m)
  if (j.deep > 0.04) {
    ctx.save();
    // Web filaments
    ctx.globalAlpha = j.deep * 0.22;
    var flaments = [[0,70,sw,260],[sw*0.2,20,sw*0.65,380],[sw*0.55,35,sw,460]];
    for (var fi = 0; fi < flaments.length; fi++) {
      var fl = flaments[fi];
      var flg = ctx.createLinearGradient(fl[0],fl[1],fl[2],fl[3]);
      flg.addColorStop(0,'rgba(150,100,255,0)');
      flg.addColorStop(0.5,'rgba(150,100,255,0.5)');
      flg.addColorStop(1,'rgba(150,100,255,0)');
      ctx.strokeStyle = flg; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(fl[0], fl[1]);
      ctx.quadraticCurveTo((fl[0]+fl[2])/2+80, (fl[1]+fl[3])/2-80, fl[2], fl[3]);
      ctx.stroke();
    }
    // Distant galaxies
    var dgals = [
      [sw*0.14,75, 38,14, 0.4,'rgba(255,200,100,'],
      [sw*0.42,58, 46,18,-0.3,'rgba(100,180,255,'],
      [sw*0.68,96, 34,12, 0.6,'rgba(255,150,200,'],
      [sw*0.86,135,42,16, 0.2,'rgba(150,255,180,'],
      [sw*0.28,165,36,13,-0.5,'rgba(200,150,255,'],
      [sw*0.57,188,40,15, 0.1,'rgba(255,220,150,']
    ];
    for (var dgi = 0; dgi < dgals.length; dgi++) {
      var dg = dgals[dgi];
      // Glow
      var dgg = ctx.createRadialGradient(dg[0],dg[1],0, dg[0],dg[1],dg[2]*2.2);
      dgg.addColorStop(0, dg[5]+'0.35)');
      dgg.addColorStop(1, dg[5]+'0)');
      ctx.fillStyle = dgg;
      ctx.globalAlpha = j.deep * 0.55;
      ctx.save();ctx.translate(dg[0],dg[1]);ctx.rotate(dg[4]);ctx.beginPath();ctx.ellipse(0,0,dg[2]*2.2,dg[3]*2.2,0,0,Math.PI*2);ctx.fill();ctx.restore();
      // Core
      ctx.fillStyle = dg[5]+'0.85)';
      ctx.globalAlpha = j.deep;
      ctx.save();ctx.translate(dg[0],dg[1]);ctx.rotate(dg[4]);ctx.beginPath();ctx.ellipse(0,0,dg[2],dg[3],0,0,Math.PI*2);ctx.fill();ctx.restore();
    }
    // CMB color wash
    ctx.globalAlpha = j.deep * 0.07;
    var cmbg = ctx.createLinearGradient(0,0,sw,sh);
    cmbg.addColorStop(0,'#ff6600'); cmbg.addColorStop(0.25,'#0066ff');
    cmbg.addColorStop(0.5,'#ff0066'); cmbg.addColorStop(0.75,'#00ffaa');
    cmbg.addColorStop(1,'#ff6600');
    ctx.fillStyle = cmbg; ctx.fillRect(0, 0, sw, skyH);
    ctx.restore();
  }

  ctx.globalAlpha = 1;
}

function getStage(){return STAGES[Math.min(stage-1,STAGES.length-1)];}
var rings=[], ringSpawnT=0;
var RING_TIERS=[
  {col:'#fbbf24',glow:'#fde047',bad:false, r:32},
  {col:'#e2e8f0',glow:'#ffffff',bad:false, r:28},
  {col:'#f472b6',glow:'#e879f9',bad:false, r:24},
  {col:'#dc2626',glow:'#ef4444',bad:true,  r:28},
  {col:'#7c2d12',glow:'#f97316',bad:true,  r:24},
];
function makeRingBonus(tier){
  if(tier.bad){
    var v=-(10+Math.floor(Math.random()*52)); // doubled: was -(5+rand*26)
    tier.bonus=v; tier.label=v+'m';
  } else {
    var v=10+Math.floor(Math.random()*41); // +10 to +50m
    tier.bonus=v; tier.label='+'+v+'m';
  }
}
function spawnRing(meters){
  var dangerChance=meters<80?0:meters<300?0.375:0.6;
  var isDanger=Math.random()<dangerChance;
  var tier;
  if(isDanger){ tier=meters<300?3:4; }
  else { tier=meters<120?0:meters<250?1:meters<450?2:3; }
  var t=RING_TIERS[tier];
  makeRingBonus(t);
  // Pure screen-space: fixed pixel velocity, independent of camera/ball speed
  var spd=(3+tier*0.6+Math.random()*1.5)*0.5;
  if(t.bad) spd*=1.5;
  var sx,sy,svx,svy;
  if(t.bad){
    var edge=Math.floor(Math.random()*4);
    if(edge===0){sx=W()+t.r+10;sy=60+Math.random()*(H()*0.55);svx=-spd;svy=(Math.random()-0.5)*0.3;}
    else if(edge===1){sx=-t.r-10;sy=60+Math.random()*(H()*0.55);svx=spd;svy=(Math.random()-0.5)*0.3;}
    else if(edge===2){sx=W()*0.2+Math.random()*W()*0.6;sy=-t.r-10;svx=(Math.random()-0.5)*0.3;svy=spd;}
    else{sx=W()*0.2+Math.random()*W()*0.6;sy=H()*0.8+t.r+10;svx=(Math.random()-0.5)*0.3;svy=-spd;}
  } else {
    sx=W()+t.r+10; sy=60+Math.random()*(H()*0.55);
    svx=-spd; svy=(Math.random()-0.5)*0.3;
  }
  rings.push({
    sx:sx, sy:sy, svx:svx, svy:svy,
    r:t.r, tier:tier, bad:t.bad,
    col:t.col, glow:t.glow, bonus:t.bonus, label:t.label,
    pulse:Math.random()*Math.PI*2,
    hit:false, hitAnim:0, explode:false, explodeAnim:0, life:1.0
  });
}


function updateUnlockStrip() {
  var tiers = [
    {id:'silver', ready:silverReady, at:nextSilverAt},
    {id:'gold',   ready:goldReady,   at:nextGoldAt},
    {id:'diamond',ready:diamondReady,at:nextDiamondAt}
  ];
  for (var i = 0; i < tiers.length; i++) {
    var t = tiers[i];
    var fill = document.getElementById('usfill-'+t.id);
    var left = document.getElementById('usleft-'+t.id);
    if (!fill) continue;
    if (t.ready) {
      fill.style.width = '100%';
      left.textContent = 'UNLOCKED';
      left.style.color = '#4ade80';
    } else {
      var pct = Math.min(totalRange / t.at, 1);
      fill.style.width = Math.floor(pct * 100) + '%';
      var rem = t.at - totalRange;
      left.textContent = rem >= 1000 ? Math.round(rem/1000)+'km left' : rem+'m left';
    }
  }
}
function checkMilestones(){
  if(!silverReady&&totalRange>=nextSilverAt){silverReady=1;showAban({name:'Silver Ball Unlocked!',desc:'Reach 5000m total',emoji:'S'});}
  if(!goldReady&&totalRange>=nextGoldAt){goldReady=1;showAban({name:'Gold Ball Unlocked!',desc:'Reach 50000m total',emoji:'G'});}
  if(!diamondReady&&totalRange>=nextDiamondAt){diamondReady=1;showAban({name:'Diamond Ball Unlocked!',desc:'Reach 100000m total',emoji:'D'});}
  updateUnlockBars();
  updateUnlockStrip();
}
function getNextUnlockHint(){
  if(!silverReady) return 'Silver ball at '+(nextSilverAt-totalRange)+'m more!';
  if(!goldReady) return 'Gold ball at '+(nextGoldAt-totalRange)+'m more!';
  if(!diamondReady) return 'Diamond ball at '+(nextDiamondAt-totalRange)+'m more!';
  return '';
}
function getAvail(){
  var r=[];
  for(var i=0;i<BALLS.length;i++) if(BALLS[i].always) r.push(BALLS[i]);
  if(silverReady) r.push(BALLS[6]);
  if(goldReady) r.push(BALLS[7]);
  if(diamondReady) r.push(BALLS[8]);
  return r;
}

function checkRingSliceFromPts(swipePts){
  if(!swipePts||swipePts.length<2) return;
  var fb=[];for(var i=0;i<balls.length;i++)if(balls[i].flying)fb.push(balls[i]);
  if(!fb.length) return;
  var seg=swipePts.slice(-6);
  for(var ri=rings.length-1;ri>=0;ri--){
    var rg=rings[ri];
    if(rg.hit||rg.explode||rg.sliced) continue;
    for(var pi=1;pi<seg.length;pi++){
      var ax2=seg[pi-1].x,ay2=seg[pi-1].y,bx2=seg[pi].x,by2=seg[pi].y;
      var ldx=bx2-ax2,ldy=by2-ay2,llen=Math.sqrt(ldx*ldx+ldy*ldy);
      if(llen<1) continue;
      var rgsx=rg.sx, rgsy=rg.sy;
      var t2=((rgsx-ax2)*ldx+(rgsy-ay2)*ldy)/(llen*llen);
      t2=Math.max(0,Math.min(1,t2));
      var clx=ax2+t2*ldx,cly=ay2+t2*ldy;
      var dist=Math.sqrt((rgsx-clx)*(rgsx-clx)+(rgsy-cly)*(rgsy-cly));
      if(dist<rg.r*camScale+28){
        rg.hit=true; rg.hitAnim=0; rg.sliced=true;
        var rwx=(rg.sx-W()/2)/camScale+camX;
        var rwy=(rg.sy-H()/2)/camScale+camY;
        if(rg.bad){
          // Sliced danger ring = BLOCKED, zero penalty, just green sparks
          rg.explode=true; rg.explodeAnim=0;
          emit(rwx,rwy,'#4ade80',50);
          emit(rwx,rwy,'#86efac',30);
          addFT(rwx,rwy-30,'BLOCKED!','#4ade80',22);
          // no ringDistBonus change, no score change
        } else {
          // Sliced positive ring = bonus distance + score
          ringDistBonus+=rg.bonus;
          emit(rwx,rwy,rg.glow,30);
          addWT(fb[0].wx,fb[0].wy-55,rg.bonus);
          score+=rg.bonus*combo;
          if(score<0)score=0;
          document.getElementById('sscore').textContent=score;
        }
        break;
      }
    }
  }
}
// Keep old name as alias
function checkRingSlice(){ checkRingSliceFromPts(windPts); }

function applyWind(){
  var fb=[];for(var i=0;i<balls.length;i++)if(balls[i].flying)fb.push(balls[i]);
  if(!fb.length||windPts.length<4){windPts=[];return;}
  var dx=windPts[windPts.length-1].x-windPts[0].x;
  var dy=windPts[windPts.length-1].y-windPts[0].y;
  var sp=Math.sqrt(dx*dx+dy*dy);
  if(sp<20){windPts=[];return;}
  var rightness=Math.max(0,dx/sp);
  var straightness=Math.max(0,1-Math.abs(dy/sp)*0.9);
  var speed=Math.min(1,sp/140);
  var quality=rightness*straightness*speed;
  // Plain tail wind
  if(quality>0.35){
    for(var i=0;i<fb.length;i++){
      var boost=quality*0.15*Math.abs(fb[i].flyVx);
      fb[i].flyVx+=boost;fb[i].flyVy-=quality*1.0;
      var g=Math.round(boost*12);
      if(g>0)addWT(fb[i].wx,fb[i].wy-40,g);
    }
    emit(fb[0].wx,fb[0].wy,'#38bdf8',14);
    addFT(fb[0].wx,fb[0].wy-20,'TAIL WIND!','#7dd3fc',16);
    windFx={x:windPts[0].x,y:windPts[0].y,ex:windPts[windPts.length-1].x,ey:windPts[windPts.length-1].y,col:'#38bdf8',life:1};
  }
  windPts=[];
}

function updatePwr(){
  var s=pts.slice(-6);if(s.length<2)return;
  var dx=s[s.length-1].x-s[0].x,dy=s[s.length-1].y-s[0].y;
  document.getElementById('pwrfill').style.width=Math.min(Math.sqrt(dx*dx+dy*dy)/14,1)*100+'%';
}
function tryHit(){
  if(!balls.length||phase!=='incoming'||pts.length<4)return;
  var seg=pts.slice(-8);var svx=seg[seg.length-1].x-seg[0].x,svy=seg[seg.length-1].y-seg[0].y,sp=Math.sqrt(svx*svx+svy*svy);
  if(sp<3)return;
  var anyHit=false;
  for(var i=0;i<balls.length;i++){
    var b=balls[i];if(b.hit||!b.bLaunch)continue;
    var bs=w2s(b.wx,b.wy);var hr=b.bt.ghost?(b.r*camScale+40):(b.r*camScale+22);
    var rp=pts.slice(-14);var hit=false;
    for(var j=0;j<rp.length;j++){var ddx=rp[j].x-bs.x,ddy=rp[j].y-bs.y;if(Math.sqrt(ddx*ddx+ddy*ddy)<hr){hit=true;break;}}
    if(!hit)continue;
    anyHit=true;
    var nx=svx/sp,ny=svy/sp,base=sp*0.30,bmult=0.85+(b.bt.spd/5.0)*0.18,pow=base*bmult*(1+b.bt.bonus*0.06);
    // Hit quality 0..1 based on swipe speed
    var hitQuality=Math.min(1, sp/90);
    lastHitQuality=hitQuality;
    combo++;
    var hitPts=hitQuality>0.85?100:hitQuality>0.6?50:20;
    score+=hitPts*combo;
    document.getElementById('sscore').textContent=score;
    b.hit=true;b.flying=true;
    b.perfectHit=(hitQuality>0.85);
    var launchPow=Math.max(pow, 5);
    // Always rightward arc - clamp minimum velocity components
    b.flyVx=Math.max(launchPow*0.78, 6);  // always moves right
    b.flyVy=Math.min(-launchPow*0.65-2, -5); // always goes up first
    // Visual feedback for hit quality
    if(hitQuality>0.85){
      // Perfect hit - fire burst + big combo flash
      addFT(b.wx,b.wy-42,'PERFECT!','#fde047',24);
      emit(b.wx,b.wy,'#ff6600',50);
      emit(b.wx,b.wy,'#fbbf24',30);
    } else if(hitQuality>0.6){
      // Good hit - smaller burst
      emit(b.wx,b.wy,'#fb923c',22);
    } else {
      // Weak hit
      addFT(b.wx,b.wy-28,'+'+hitPts,'#94a3b8',14);
    }
    var hc=b.bt.fire?'#ff6600':b.bt.ice?'#38bdf8':b.bt.id==='diamond'?'#7dd3fc':b.bt.id==='gold'?'#fbbf24':b.bt.id==='silver'?'#94a3b8':'rgba(255,255,200,0.9)';
    emit(b.wx,b.wy,hc,28);
    if(b.bt.ghost){emit(b.wx,b.wy,'rgba(200,210,255,0.9)',40);addFT(b.wx,b.wy-30,'GHOST HIT x2','#c7d2fe',20);}
    else if(b.bt.bonus>0)addFT(b.wx,b.wy-26,'+'+Math.round(b.bt.bonus*100)+'%',b.bt.fg,18);
  }
  if(anyHit){
    phase='flying';document.getElementById('plbl').style.opacity='0';
    document.getElementById('pwrfill').style.width='0%';pts=[];
    peakY=999999;
    for(var i=0;i<balls.length;i++)if(balls[i].flying&&balls[i].wy<peakY)peakY=balls[i].wy;
    showHint('Swipe through the rings!','#fbbf24');
    document.getElementById('windtutorial').style.opacity='1';
    setTimeout(function(){document.getElementById('windtutorial').style.opacity='0';},2000);
    document.getElementById('msg').textContent='';
  }
}
function calcM(wx){return Math.max(0,Math.round((wx-HOME_X)/PPM));}
function finishBall(b){
  b.flying=false;var m=calcM(b.wx);landMarks.push({wx:b.wx,meters:m,bt:b.bt});
  var sf=0;for(var i=0;i<balls.length;i++)if(balls[i].flying)sf++;
  var ul=0;for(var i=0;i<balls.length;i++)if(!balls[i].bLaunch)ul++;
  if(sf>0||ul>0)return;
  camFrozen=true;
  var finalM=0;
  if(curBT.multi){for(var i=0;i<landMarks.length;i++)finalM+=landMarks[i].meters;}
  else{for(var i=0;i<landMarks.length;i++)if(landMarks[i].meters>finalM)finalM=landMarks[i].meters;}
  finalM=Math.max(0,finalM+ringDistBonus);
  ringDistBonus=0;
  pendingScore=finalM;
  if(finalM>best){best=finalM;document.getElementById('sbest').textContent=best+' m';}
  // Stage progress check

      document.getElementById('stageprog').textContent='0/'+nsg.hits;
      document.getElementById('stageprog').style.color='#fbbf24';
      addFT(HOME_X+200,GR()-120,'STAGE '+stage+'!','#4ade80',28);
      emit(HOME_X+200,GR()-100,'#4ade80',50);
    }
  } else {
    document.getElementById('stageprog').style.color='#ef4444';
  }
  if(bonusActive){
    bonusTotal+=finalM;var allDone=true;
    for(var i=0;i<balls.length;i++)if(!balls[i].hit)allDone=false;
    if(allDone){
      bonusActive=false;bonusNextAt=totalRange+5000;
      totalRange+=bonusTotal;document.getElementById('stotal').textContent=totalRange+' m';checkMilestones();
      hits++;document.getElementById('shits').textContent=hits;
      document.getElementById('sdist').textContent=bonusTotal+' m';
      document.getElementById('dfly').textContent='';
      document.getElementById('msg').textContent='BONUS +'+bonusTotal+'m!';
      var bf=document.getElementById('bonusfl');
      document.getElementById('bonustxt').textContent='+'+bonusTotal+'m!';
      bf.style.opacity='1';setTimeout(function(){bf.style.opacity='0';},1800);
      btnOn();checkAch();showRankToast();phase='done';
    }
  } else {
    totalRange+=finalM;document.getElementById('stotal').textContent=totalRange+' m';checkMilestones();
    hits++;document.getElementById('shits').textContent=hits;
    document.getElementById('sdist').textContent=finalM+' m';
    document.getElementById('dfly').textContent='';
    var msg2=finalM>350?'MONSTER! '+finalM+'m!!':finalM>250?'HOME RUN! '+finalM+'m!':finalM>180?'Great hit! '+finalM+'m':finalM>120?'Nice hit! '+finalM+'m':'Hit! '+finalM+'m';
    document.getElementById('msg').textContent=msg2;
    autoUpdateScore();
    btnOn();checkAch();showRankToast();
    if(totalRange>=bonusNextAt)setTimeout(function(){startBonus();},700);
    phase='done';
  }
  var maxL=landMarks[0];for(var i=1;i<landMarks.length;i++)if(landMarks[i].wx>maxL.wx)maxL=landMarks[i];
  tCamX=maxL.wx;tCamY=GR()-80;tScale=0.9;camX=tCamX;camY=tCamY;camScale=tScale;
}
function computeCam(){
  var gr=GR();
  if(camFrozen||!balls.length)return;
  var fb=[];for(var i=0;i<balls.length;i++)if(balls[i].flying)fb.push(balls[i]);
  if(!fb.length){tCamX=HOME_X+40;tCamY=gr-100;tScale=1;return;}
  var lead=fb[0];for(var i=1;i<fb.length;i++)if(fb[i].wx>lead.wx)lead=fb[i];
  // Keep ball centered with slight lead ahead of travel direction
  tCamX=lead.wx + lead.flyVx*3;   // look ahead slightly
  tCamY=lead.wy + (lead.flyVy>0 ? lead.flyVy*2 : -20); // follow arc
  // Scale: zoom out based on speed, keep ball visible
  var dist=Math.max(1,lead.wx-HOME_X);
  tScale=Math.max(0.45,Math.min(1.0, 800/dist));
}
function update(){
  var gr=GR();ghostT+=0.06;arrowT+=0.04;waveT+=0.02;
  if(bonusActive)for(var i=0;i<balls.length;i++){if(!balls[i].bLaunch){balls[i].bDel--;if(balls[i].bDel<=0)balls[i].bLaunch=true;}}
  for(var i=0;i<balls.length;i++){
    var b=balls[i];if(!b.bLaunch)continue;b.t++;
    if(!b.hit&&(phase==='incoming'||phase==='flying')){
      if(b.bt.zz){b.vx+=Math.sin(b.t*0.2+b.zp)*0.4;b.vy+=Math.cos(b.t*0.15)*0.12;}
      b.wx+=b.vx;b.wy+=b.vy;b.spin-=0.14;
      b.trail.push({wx:b.wx,wy:b.wy});if(b.trail.length>20)b.trail.shift();
      var s2=w2s(b.wx,b.wy);if(s2.x<-40&&!b.hit){b.hit=true;b.flying=false;}
    }
    if(b.flying){
      if(b.bt.zz)b.flyVy+=Math.sin(b.t*0.22+b.zp)*0.38;
      b.wx+=b.flyVx;b.wy+=b.flyVy;b.flyVy+=0.13;b.flyVx=Math.max(b.flyVx*0.9998,2);b.spin+=0.25;
      b.trail.push({wx:b.wx,wy:b.wy});if(b.trail.length>100)b.trail.shift();
      if(b.wy<peakY)peakY=b.wy;
      if(b.wy>=gr&&b.flyVy>0)finishBall(b);
    }
    if(b.bt.ghost&&!b.hit)b.gA=Math.max(0,0.35+0.35*Math.sin(ghostT*2.5+b.t*0.1));
  }
  if(!bonusActive&&phase==='incoming'&&balls.length){
    var lb=[];for(var i=0;i<balls.length;i++)if(balls[i].bLaunch)lb.push(balls[i]);
    if(lb.length&&lb.every(function(b){return b.hit&&!b.flying;})){
      phase='miss';combo=0;document.getElementById('msg').textContent='Missed!';
      document.getElementById('plbl').style.opacity='0';btnOn();
    }
  }
  // BONUS STUCK FIX: if bonus active and all balls launched+done, force finish
  if(bonusActive&&phase==='incoming'&&balls.length){
    var allLaunched=balls.every(function(b){return b.bLaunch;});
    var allDone2=balls.every(function(b){return b.hit&&!b.flying;});
    if(allLaunched&&allDone2){
      // Force finish by calling finishBall on last ball
      var lastB=balls[balls.length-1];
      if(!lastB.flying){lastB.flying=true;lastB.wy=gr;lastB.flyVy=1;finishBall(lastB);}

          ctx.shadowBlur=0;
          var grad=ctx.createRadialGradient(0,0,0,0,0,rg.r*(0.8+ea));
          grad.addColorStop(0,'rgba(255,255,200,'+(0.9*(1-ea))+')');
          grad.addColorStop(0.4,'rgba(255,120,0,'+(0.7*(1-ea))+')');
          grad.addColorStop(1,'rgba(200,0,0,0)');
          ctx.fillStyle=grad;
          ctx.beginPath();ctx.arc(0,0,rg.r*(0.8+ea),0,Math.PI*2);ctx.fill();
          ctx.strokeStyle='rgba(255,200,0,'+(0.6*(1-ea))+')';
          ctx.lineWidth=2;
          for(var sp2=0;sp2<8;sp2++){
            var sa2=sp2*Math.PI/4+ea*2;
            var r1b=rg.r*(0.5+ea*1.5),r2b=rg.r*(1.2+ea*3);
            ctx.beginPath();ctx.moveTo(Math.cos(sa2)*r1b,Math.sin(sa2)*r1b);
            ctx.lineTo(Math.cos(sa2)*r2b,Math.sin(sa2)*r2b);ctx.stroke();
          }
        } else {
          // GOOD RING MISS: simple fade
          ctx.shadowColor='#ef4444'; ctx.shadowBlur=30*(1-ea);
          ctx.strokeStyle='rgba(239,68,68,'+(1-ea)+')';
          ctx.lineWidth=3+ea*4;
          ctx.beginPath();ctx.arc(0,0,rg.r*(1+ea*3),0,Math.PI*2);ctx.stroke();
          ctx.fillStyle='rgba(255,200,100,'+(0.6*(1-ea))+')';
          ctx.beginPath();ctx.arc(0,0,rg.r*(0.5+ea*2),0,Math.PI*2);ctx.fill();
        }
      } else {
        // Pulse warning: ring flashes red when close to left edge
        // Bad rings pulse faster and have warning glow
        var urgentPulse = rg.bad ? (0.5+0.5*Math.sin(rg.pulse*3)) : rPulse;
        var ringCol = rg.bad ? rg.col : rg.col;
        var glowCol = rg.glow;
        // Outer glow
        ctx.shadowColor=glowCol;
        ctx.shadowBlur=22*urgentPulse;
        // Outer ring
        ctx.strokeStyle=ringCol;
        ctx.lineWidth=4+rg.tier;
        ctx.beginPath();ctx.arc(0,0,rg.r,0,Math.PI*2);ctx.stroke();
        // Inner ring
        ctx.strokeStyle=rg.glow;
        ctx.lineWidth=1.5;
        ctx.globalAlpha=rAlpha*urgentPulse;
        ctx.beginPath();ctx.arc(0,0,rg.r*0.65,0,Math.PI*2);ctx.stroke();
        // Bonus label
        ctx.shadowBlur=0;
        ctx.globalAlpha=rAlpha*0.95;
        ctx.fillStyle='#ffffff';
        ctx.textAlign='center';
        ctx.font='bold '+(12+rg.tier*3)+'px Arial';
        ctx.fillText(rg.label,0,4);
        if(!rg.hit){
          if(rg.bad){
            // Danger: inward arrows showing magnet pull
            ctx.globalAlpha=rAlpha*urgentPulse;
            ctx.strokeStyle='#ef4444'; ctx.lineWidth=2;
            ctx.shadowColor='#ef4444'; ctx.shadowBlur=8;
            for(var sp=0;sp<4;sp++){
              var sa=rg.pulse*2+sp*Math.PI/2;
              var ox=Math.cos(sa)*(rg.r+14),oy=Math.sin(sa)*(rg.r+14);
              var ix=Math.cos(sa)*(rg.r+3),iy=Math.sin(sa)*(rg.r+3);
              ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ix,iy);ctx.stroke();
              ctx.fillStyle='#ef4444';
              ctx.beginPath();ctx.arc(ix,iy,2.5,0,Math.PI*2);ctx.fill();
            }
          } else {
            // Good: rotating sparkles
            ctx.globalAlpha=rAlpha*0.6;
            var nSparkles=3+rg.tier;
            for(var sp=0;sp<nSparkles;sp++){
              var sa=rg.pulse*1.4+sp*Math.PI*2/nSparkles;
              var sr2=rg.r+10;
              ctx.fillStyle=rg.glow;
              ctx.beginPath();ctx.arc(Math.cos(sa)*sr2,Math.sin(sa)*sr2,2,0,Math.PI*2);ctx.fill();
            }
          }
        }
      }
      ctx.restore();
    }
    ctx.globalAlpha=1;
  }

  // 2. WORLD SPACE - stadium, balls, etc
  ctx.save();
  ctx.translate(W()/2,H()/2);ctx.scale(camScale,camScale);ctx.translate(-camX,-camY);
  var vl=camX-W()/(2*camScale)-400,vr=camX+W()/(2*camScale)+400;

  dLights(vl,vr,gr);dCrowd(vl,vr,gr);dFence(vl,vr,gr);dGrass(vl,vr,gr);
  var f0=Math.max(1,Math.ceil((vl-HOME_X)/(FLAG_INT*PPM)));
  var f1=Math.floor((vr+300-HOME_X)/(FLAG_INT*PPM))+1;
  for(var fi=f0;fi<=f1;fi++)dFlag(HOME_X+fi*FLAG_INT*PPM,fi*FLAG_INT,gr);
  dArrow(gr);
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.ellipse(HOME_X,gr-3,14,5,0,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.scale(-1,1);ctx.translate(-PITCHER_X*2,0);ctx.fillStyle='#dc2626';ctx.beginPath();ctx.rect(PITCHER_X-7,gr-62,14,20);ctx.fill();ctx.fillStyle='#fde68a';ctx.beginPath();ctx.arc(PITCHER_X,gr-75,8,0,Math.PI*2);ctx.fill();ctx.restore();

  for(var i=0;i<landMarks.length;i++){
    var lm=landMarks[i];
    ctx.save();ctx.shadowColor=lm.bt.glow;ctx.shadowBlur=20;ctx.strokeStyle=lm.bt.glow;ctx.lineWidth=3;ctx.globalAlpha=0.75;
    ctx.beginPath();ctx.ellipse(lm.wx,gr-3,20,7,0,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=0.22;ctx.fillStyle=lm.bt.glow;ctx.beginPath();ctx.ellipse(lm.wx,gr-3,20,7,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    dBall({wx:lm.wx,wy:gr-17,r:14,bt:lm.bt,spin:0,hit:true,flying:false,trail:[],gA:1,t:0},1);
    ctx.fillStyle='#fbbf24';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.fillText(lm.meters+' m',lm.wx,gr-35);
  }
  for(var i=0;i<balls.length;i++)dTrail(balls[i]);
  for(var i=0;i<particles.length;i++){ctx.save();ctx.globalAlpha=particles[i].life;ctx.beginPath();ctx.arc(particles[i].wx,particles[i].wy,particles[i].r,0,Math.PI*2);ctx.fillStyle=particles[i].col;ctx.fill();ctx.restore();}
  for(var i=0;i<floatTexts.length;i++){var ft=floatTexts[i];ctx.save();ctx.globalAlpha=ft.life;ctx.fillStyle=ft.col;ctx.font='bold '+ft.sz+'px Arial';ctx.textAlign='center';ctx.fillText(ft.text,ft.wx,ft.wy);ctx.restore();}
  for(var i=0;i<windTexts.length;i++){
    var wt2=windTexts[i];ctx.save();ctx.globalAlpha=wt2.life;
    var isPos=wt2.val>0;var fs=Math.min(48,28+Math.abs(wt2.val)/3);
    ctx.font='900 '+fs+'px Arial';ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.9)';ctx.lineWidth=7;ctx.lineJoin='round';
    ctx.strokeText((isPos?'+':'')+wt2.val+' m',wt2.wx,wt2.wy);
    ctx.fillStyle=isPos?'#38bdf8':'#f87171';ctx.fillText((isPos?'+':'')+wt2.val+' m',wt2.wx,wt2.wy);
    ctx.restore();
  }
  for(var i=0;i<balls.length;i++){
    var b=balls[i];
    if(!b.bLaunch||(b.hit&&!b.flying))continue;
    dBall(b);
    // Draw live info label above flying ball
    if(b.flying){
      var bm=calcM(b.wx);
      if(bm>0){
        ctx.save();
        ctx.font='bold 36px monospace';
        ctx.textAlign='center';
        ctx.textBaseline='bottom';
        // Distance
        var distTxt=bm+'m';
        // Ring bonus line
        var bonusTxt=ringDistBonus!==0?(ringDistBonus>0?'+':'')+ringDistBonus+'m rings':'';
        // Total
        var totalTxt=ringDistBonus!==0?'= '+(Math.max(0,bm+ringDistBonus))+'m total':'';
        var lx=b.wx, ly=b.wy-b.r-10;
        // Background pill
        var lineH=42, pad=12;
        var lines=bonusTxt?[distTxt,bonusTxt,totalTxt]:[distTxt];
        var maxW=0;
        for(var li=0;li<lines.length;li++){if(ctx.measureText(lines[li]).width>maxW)maxW=ctx.measureText(lines[li]).width;}
        ctx.globalAlpha=0.75;
        ctx.fillStyle='rgba(3,8,20,0.85)';
        ctx.beginPath();
        ctx.roundRect(lx-maxW/2-pad, ly-lines.length*lineH-4, maxW+pad*2, lines.length*lineH+8, 8);
        ctx.fill();
        ctx.globalAlpha=1;
        // Draw each line
        for(var li=0;li<lines.length;li++){
          ctx.fillStyle=li===0?'#fbbf24':li===1?(ringDistBonus>0?'#4ade80':'#f87171'):'#ffffff';
          ctx.fillText(lines[li], lx, ly-(lines.length-1-li)*lineH);
        }
        ctx.restore();
      }
    }
  }
  ctx.restore();

  if(windFx){ctx.save();ctx.globalAlpha=windFx.life*0.6;ctx.strokeStyle=windFx.col;ctx.lineWidth=3;ctx.setLineDash([8,6]);ctx.beginPath();ctx.moveTo(windFx.x,windFx.y);ctx.lineTo(windFx.ex,windFx.ey);ctx.stroke();ctx.setLineDash([]);ctx.restore();}
  // ARC SWING TRAIL
  if(pts.length>1){
    ctx.save();
    // Draw glowing arc through swipe points
    for(var i=1;i<pts.length;i++){
      var t=i/pts.length;
      ctx.globalAlpha=t*0.9;
      ctx.lineWidth=t*10+2;
      ctx.lineCap='round';
      ctx.strokeStyle='rgba(255,220,50,'+(t*0.95)+')';
      ctx.shadowColor='#fbbf24';
      ctx.shadowBlur=16*t;
      ctx.beginPath();
      ctx.moveTo(pts[i-1].x,pts[i-1].y);
      ctx.lineTo(pts[i].x,pts[i].y);
      ctx.stroke();
    }
    // Bright tip at end of swing
    if(pts.length>2){
      var tip=pts[pts.length-1];
      ctx.globalAlpha=1;
      ctx.fillStyle='#ffffff';
      ctx.shadowColor='#fbbf24';
      ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(tip.x,tip.y,5,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
  if(windDraw&&windPts.length>1){
    ctx.save();
    for(var i=1;i<windPts.length;i++){
      var wt=i/windPts.length;
      ctx.globalAlpha=wt*0.85;
      ctx.lineWidth=wt*5+1.5;
      ctx.lineCap='round';
      ctx.strokeStyle='#38bdf8';
      ctx.shadowColor='#38bdf8';
      ctx.shadowBlur=10;
      ctx.beginPath();ctx.moveTo(windPts[i-1].x,windPts[i-1].y);ctx.lineTo(windPts[i].x,windPts[i].y);ctx.stroke();
    }
    if(windPts.length>3){
      var wp=windPts[windPts.length-1];
      var wp2=windPts[windPts.length-4];
      var wa=Math.atan2(wp.y-wp2.y,wp.x-wp2.x);
      ctx.globalAlpha=0.95;ctx.fillStyle='#38bdf8';ctx.shadowBlur=14;
      ctx.save();ctx.translate(wp.x,wp.y);ctx.rotate(wa);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-16,-8);ctx.lineTo(-16,8);ctx.closePath();ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }
}

var lastFrameTime = 0, frameAccum = 0;
var FRAME_MS = 1000 / 60;
var fpsCalibrated = false, fpsFrames = 0, fpsSamples = [];
var physicsScale = 1.0;

function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastFrameTime) { lastFrameTime = ts; return; }
  var delta = Math.min(ts - lastFrameTime, 50);
  lastFrameTime = ts;

  // Calibrate FPS over first 30 frames
  if (!fpsCalibrated) {
    fpsSamples.push(delta);
    if (fpsSamples.length >= 30) {
      var avg = 0;
      for (var i = 0; i < fpsSamples.length; i++) avg += fpsSamples[i];
      avg /= fpsSamples.length;
      // If avg frame time < 12ms, we're on 120Hz - scale physics to half
      physicsScale = avg < 12 ? 0.5 : 1.0;
      fpsCalibrated = true;
    }
    drawScene();
    return;
  }

  frameAccum += delta;
  if (frameAccum >= FRAME_MS * physicsScale) {
    update();
    frameAccum -= FRAME_MS * physicsScale;
    if (frameAccum > FRAME_MS) frameAccum = 0;
  }
  drawScene();
}
window.addEventListener('load', function() {
  document.body.offsetHeight;
  sizeCanvas();
  updateUnlockStrip();
  loadScores();
  requestAnimationFrame(function() {
    sizeCanvas();
    requestAnimationFrame(function() {
      sizeCanvas();
      loop();
    });
  });
});
</script>
